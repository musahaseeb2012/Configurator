<path d="M765,330 L768,268 L754,235 L724,212 L692,200 C665,192 635,172 595,150 L540,128 L505,108 L340,105 L248,115 L215,148 L194,185 L174,225 L148,268 L135,330 Z" fill="url(#bd)" stroke="#222" stroke-width="1.5"/>
