  <line x1="0" y1="-44" x2="0" y2="-14" stroke="#bbb" stroke-width="5" stroke-linecap="round" transform="rotate(144)"/>
  <line x1="0" y1="-44" x2="0" y2="-14" stroke="#bbb" stroke-width="5" stroke-linecap="round" transform="rotate(216)"/>
  <line x1="0" y1="-44" x2="0" y2="-14" stroke="#bbb" stroke-width="5" stroke-linecap="round" transform="rotate(288)"/>
</g>
<circle cx="700" cy="330" r="58" fill="#111" stroke="#1a1a1a" stroke-width="2"/>
