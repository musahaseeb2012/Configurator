<path d="M533,158 L535,130 L544,150 L540,162 Z" fill="rgba(40,40,40,0.8)"/>
<!-- wheels -->
<circle cx="215" cy="330" r="55" fill="#111" stroke="#1a1a1a" stroke-width="2"/>
