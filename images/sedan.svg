<circle cx="215" cy="330" r="12" fill="#1a1a1a"/>
<g transform="translate(215,330)">
  <line x1="0" y1="-42" x2="0" y2="-14" stroke="#bbb" stroke-width="4" stroke-linecap="round"/>
  <line x1="0" y1="-42" x2="0" y2="-14" stroke="#bbb" stroke-width="4" stroke-linecap="round" transform="rotate(72)"/>
  <line x1="0" y1="-42" x2="0" y2="-14" stroke="#bbb" stroke-width="4" stroke-linecap="round" transform="rotate(144)"/>
  <line x1="0" y1="-42" x2="0" y2="-14" stroke="#bbb" stroke-width="4" stroke-linecap="round" transform="rotate(216)"/>
  <line x1="0" y1="-42" x2="0" y2="-14" stroke="#bbb" stroke-width="4" stroke-linecap="round" transform="rotate(288)"/>
</g>
<circle cx="695" cy="330" r="55" fill="#111" stroke="#1a1a1a" stroke-width="2"/>
<circle cx="695" cy="330" r="42" fill="url(#wg)"/>
<circle cx="695" cy="330" r="12" fill="#1a1a1a"/>
<g transform="translate(695,330)">
  <line x1="0" y1="-42" x2="0" y2="-14" stroke="#bbb" stroke-width="4" stroke-linecap="round"/>
  <line x1="0" y1="-42" x2="0" y2="-14" stroke="#bbb" stroke-width="4" stroke-linecap="round" transform="rotate(72)"/>
  <line x1="0" y1="-42" x2="0" y2="-14" stroke="#bbb" stroke-width="4" stroke-linecap="round" transform="rotate(144)"/>
  <line x1="0" y1="-42" x2="0" y2="-14" stroke="#bbb" stroke-width="4" stroke-linecap="round" transform="rotate(216)"/>
  <line x1="0" y1="-42" x2="0" y2="-14" stroke="#bbb" stroke-width="4" stroke-linecap="round" transform="rotate(288)"/>
</g>
