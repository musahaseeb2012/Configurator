<path d="M760,270 L750,238 L720,210 L688,196 C660,188 625,168 585,148 L540,128 L510,104 L388,96 L280,108 L235,162" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="3" stroke-linecap="round"/>
