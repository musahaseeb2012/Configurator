<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0e0e0e"/><stop offset="100%" stop-color="#050505"/></linearGradient>
  <linearGradient id="bd" x1="0.1" y1="0" x2="0.1" y2="1"><stop offset="0%" stop-color="#e0e0e0"/><stop offset="30%" stop-color="#c5c5c5"/><stop offset="65%" stop-color="#909090"/><stop offset="100%" stop-color="#606060"/></linearGradient>
  <linearGradient id="hl" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(255,255,255,0.18)"/><stop offset="100%" stop-color="rgba(255,255,255,0)"/></linearGradient>
  <radialGradient id="gs" cx="50%" cy="100%" r="55%"><stop offset="0%" stop-color="rgba(0,0,0,0.7)"/><stop offset="100%" stop-color="rgba(0,0,0,0)"/></radialGradient>
  <radialGradient id="wg" cx="35%" cy="30%" r="60%"><stop offset="0%" stop-color="#888"/><stop offset="50%" stop-color="#555"/><stop offset="100%" stop-color="#2a2a2a"/></radialGradient>
</defs>
<rect width="900" height="400" fill="url(#bg)"/>
<!-- ground shadow -->
<ellipse cx="455" cy="345" rx="340" ry="16" fill="url(#gs)"/>
<!-- body -->
<path d="M760,330 L763,270 L750,238 L720,210 L688,196 C660,188 625,168 585,148 L540,128 L510,104 L388,96 L280,108 L235,162 L210,200 L185,212 L162,250 L138,330 Z" fill="url(#bd)" stroke="#222" stroke-width="1.5"/>
