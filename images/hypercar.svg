<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0e0e0e"/><stop offset="100%" stop-color="#050505"/></linearGradient>
  <linearGradient id="bd" x1="0.1" y1="0" x2="0.1" y2="1"><stop offset="0%" stop-color="#e0e0e0"/><stop offset="25%" stop-color="#c8c8c8"/><stop offset="55%" stop-color="#808080"/><stop offset="100%" stop-color="#484848"/></linearGradient>
  <radialGradient id="gs" cx="50%" cy="100%" r="55%"><stop offset="0%" stop-color="rgba(0,0,0,0.7)"/><stop offset="100%" stop-color="rgba(0,0,0,0)"/></radialGradient>
  <radialGradient id="wg" cx="35%" cy="30%" r="60%"><stop offset="0%" stop-color="#888"/><stop offset="50%" stop-color="#555"/><stop offset="100%" stop-color="#2a2a2a"/></radialGradient>
</defs>
<rect width="900" height="400" fill="url(#bg)"/>
<ellipse cx="455" cy="340" rx="352" ry="13" fill="url(#gs)"/>
<!-- AMG ONE hypercar: extremely low, F1-inspired, long nose, active aero -->
<path d="M820,330 L825,315 L815,295 L790,270 L755,252 L700,238 L620,225 L545,218 L490,210 C455,202 415,175 368,150 L310,128 L260,116 L210,114 L175,122 L152,140 L140,165 L128,198 L120,240 L112,285 L110,330 Z" fill="url(#bd)" stroke="#222" stroke-width="1.5"/>
