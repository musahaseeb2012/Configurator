<rect x="108" y="190" width="8" height="55" rx="2" fill="rgba(180,180,180,0.8)"/>
<path d="M85,185 L128,195 L128,200 L85,192 Z" fill="rgba(200,200,200,0.7)" stroke="#444" stroke-width="1"/>
