  <line x1="0" y1="-37" x2="0" y2="-12" stroke="#bbb" stroke-width="4" stroke-linecap="round" transform="rotate(240)"/>
  <line x1="0" y1="-37" x2="0" y2="-12" stroke="#bbb" stroke-width="4" stroke-linecap="round" transform="rotate(300)"/>
</g>
<circle cx="745" cy="330" r="48" fill="#111" stroke="#1a1a1a" stroke-width="2"/>
<circle cx="745" cy="330" r="37" fill="url(#wg)"/>
<circle cx="745" cy="330" r="10" fill="#1a1a1a"/>
<g transform="translate(745,330)">
  <line x1="0" y1="-37" x2="0" y2="-12" stroke="#bbb" stroke-width="4" stroke-linecap="round"/>
  <line x1="0" y1="-37" x2="0" y2="-12" stroke="#bbb" stroke-width="4" stroke-linecap="round" transform="rotate(60)"/>
  <line x1="0" y1="-37" x2="0" y2="-12" stroke="#bbb" stroke-width="4" stroke-linecap="round" transform="rotate(120)"/>
  <line x1="0" y1="-37" x2="0" y2="-12" stroke="#bbb" stroke-width="4" stroke-linecap="round" transform="rotate(180)"/>
  <line x1="0" y1="-37" x2="0" y2="-12" stroke="#bbb" stroke-width="4" stroke-linecap="round" transform="rotate(240)"/>
  <line x1="0" y1="-37" x2="0" y2="-12" stroke="#bbb" stroke-width="4" stroke-linecap="round" transform="rotate(300)"/>
</g>
