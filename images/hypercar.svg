<path d="M550,218 L560,212 L580,215 L578,225 L558,228 Z" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
<path d="M460,210 L470,204 L488,208 L486,218 L468,220 Z" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
<!-- Wheels (wide, low profile) -->
<circle cx="185" cy="330" r="48" fill="#111" stroke="#1a1a1a" stroke-width="2"/>
<circle cx="185" cy="330" r="37" fill="url(#wg)"/>
<circle cx="185" cy="330" r="10" fill="#1a1a1a"/>
<g transform="translate(185,330)">
  <line x1="0" y1="-37" x2="0" y2="-12" stroke="#bbb" stroke-width="4" stroke-linecap="round"/>
  <line x1="0" y1="-37" x2="0" y2="-12" stroke="#bbb" stroke-width="4" stroke-linecap="round" transform="rotate(60)"/>
  <line x1="0" y1="-37" x2="0" y2="-12" stroke="#bbb" stroke-width="4" stroke-linecap="round" transform="rotate(120)"/>
