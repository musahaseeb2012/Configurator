<path d="M495,210 C460,202 420,177 372,152 L316,130 L268,118 L215,115 L178,123 L158,140 L162,148 L216,124 L268,127 L314,140 L370,164 L488,220 Z" fill="rgba(80,110,145,0.6)" stroke="rgba(120,160,200,0.35)" stroke-width="1"/>
