<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0e0e0e"/><stop offset="100%" stop-color="#050505"/></linearGradient>
  <linearGradient id="bd" x1="0.1" y1="0" x2="0.1" y2="1"><stop offset="0%" stop-color="#e0e0e0"/><stop offset="25%" stop-color="#c8c8c8"/><stop offset="60%" stop-color="#888"/><stop offset="100%" stop-color="#555"/></linearGradient>
  <radialGradient id="gs" cx="50%" cy="100%" r="55%"><stop offset="0%" stop-color="rgba(0,0,0,0.7)"/><stop offset="100%" stop-color="rgba(0,0,0,0)"/></radialGradient>
  <radialGradient id="wg" cx="35%" cy="30%" r="60%"><stop offset="0%" stop-color="#888"/><stop offset="50%" stop-color="#555"/><stop offset="100%" stop-color="#2a2a2a"/></radialGradient>
</defs>
<rect width="900" height="400" fill="url(#bg)"/>
<ellipse cx="455" cy="342" rx="350" ry="14" fill="url(#gs)"/>
<!-- Very long hood, very low profile AMG GT body -->
<path d="M795,330 L800,310 L790,285 L765,258 L730,242 L680,228 L580,218 L510,208 C480,200 445,172 400,148 L340,128 L290,118 L232,122 L210,138 L198,160 L186,188 L170,220 L145,270 L132,330 Z" fill="url(#bd)" stroke="#222" stroke-width="1.5"/>
<!-- Long hood highlight -->
<path d="M795,310 L790,285 L765,258 L730,242 L680,228 L580,218 L510,208 C480,200 445,172 400,148 L340,128" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="3" stroke-linecap="round"/>
<!-- Windshield (very raked) -->
<path d="M512,208 C480,200 445,172 400,148 L340,130 L300,120 L295,128 L340,140 L395,162 L505,218 Z" fill="rgba(80,110,145,0.55)" stroke="rgba(120,160,200,0.3)" stroke-width="1"/>
<!-- Small side window -->
