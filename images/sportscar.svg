<!-- Air vent on hood -->
<path d="M620,224 L640,218 L660,220 L658,228 L638,232 Z" fill="#222" stroke="#444" stroke-width="1"/>
<!-- Wheels -->
<circle cx="198" cy="330" r="52" fill="#111" stroke="#1a1a1a" stroke-width="2"/>
<circle cx="198" cy="330" r="40" fill="url(#wg)"/>
<circle cx="198" cy="330" r="11" fill="#1a1a1a"/>
<g transform="translate(198,330)">
  <line x1="0" y1="-40" x2="0" y2="-13" stroke="#bbb" stroke-width="4" stroke-linecap="round"/>
  <line x1="0" y1="-40" x2="0" y2="-13" stroke="#bbb" stroke-width="4" stroke-linecap="round" transform="rotate(60)"/>
  <line x1="0" y1="-40" x2="0" y2="-13" stroke="#bbb" stroke-width="4" stroke-linecap="round" transform="rotate(120)"/>
  <line x1="0" y1="-40" x2="0" y2="-13" stroke="#bbb" stroke-width="4" stroke-linecap="round" transform="rotate(180)"/>
  <line x1="0" y1="-40" x2="0" y2="-13" stroke="#bbb" stroke-width="4" stroke-linecap="round" transform="rotate(240)"/>
  <line x1="0" y1="-40" x2="0" y2="-13" stroke="#bbb" stroke-width="4" stroke-linecap="round" transform="rotate(300)"/>
</g>
<circle cx="720" cy="330" r="52" fill="#111" stroke="#1a1a1a" stroke-width="2"/>
<circle cx="720" cy="330" r="40" fill="url(#wg)"/>
<circle cx="720" cy="330" r="11" fill="#1a1a1a"/>
<g transform="translate(720,330)">
  <line x1="0" y1="-40" x2="0" y2="-13" stroke="#bbb" stroke-width="4" stroke-linecap="round"/>
  <line x1="0" y1="-40" x2="0" y2="-13" stroke="#bbb" stroke-width="4" stroke-linecap="round" transform="rotate(60)"/>
  <line x1="0" y1="-40" x2="0" y2="-13" stroke="#bbb" stroke-width="4" stroke-linecap="round" transform="rotate(120)"/>
  <line x1="0" y1="-40" x2="0" y2="-13" stroke="#bbb" stroke-width="4" stroke-linecap="round" transform="rotate(180)"/>
  <line x1="0" y1="-40" x2="0" y2="-13" stroke="#bbb" stroke-width="4" stroke-linecap="round" transform="rotate(240)"/>
  <line x1="0" y1="-40" x2="0" y2="-13" stroke="#bbb" stroke-width="4" stroke-linecap="round" transform="rotate(300)"/>
</g>
<!-- Headlight strip -->
<path d="M798,308 L792,290 L778,278 L766,282 L770,298 L784,312 Z" fill="rgba(255,255,220,0.9)"/>
<circle cx="785" cy="295" r="8" fill="rgba(255,255,200,0.2)"/>
